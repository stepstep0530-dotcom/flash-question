<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STEP フラッシュカード｜享保の改革</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --blue:      #0057B8;
    --blue-mid:  #0070E0;
    --blue-light:#3DA0FF;
    --blue-pale: #E8F2FF;
    --accent:    #00C2FF;
    --bg:        #F0F6FF;
    --white:     #FFFFFF;
    --text:      #0D1F3C;
    --sub:       #6B8BAE;
    --card-shadow: 0 8px 32px rgba(0,87,184,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ===== ヘッダー ===== */
  .header {
    width: 100%;
    background: var(--blue);
    padding: 14px 20px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,87,184,0.25);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }
  .logo-text {
    font-size: 1rem;
    font-weight: 900;
    color: var(--white);
    letter-spacing: 0.04em;
    line-height: 1;
    white-space: nowrap;
  }
  .header-divider {
    width: 1px;
    height: 28px;
    background: rgba(255,255,255,0.25);
    margin: 0 6px;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.04em;
  }

  /* ===== メインコンテンツ ===== */
  .main {
    width: 100%;
    max-width: 440px;
    padding: 22px 18px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ===== 進捗 ===== */
  .progress-section {
    width: 100%;
    margin-bottom: 20px;
  }
  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 7px;
  }
  .progress-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .progress-count {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--sub);
  }
  .progress-count b {
    font-size: 1rem;
    color: var(--blue);
  }
  .progress-bar {
    height: 7px;
    background: #D0E4FA;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--accent));
    border-radius: 99px;
    transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
  }

  /* ===== カード ===== */
  .card-wrap {
    width: 100%;
    perspective: 1200px;
    margin-bottom: 20px;
    cursor: pointer;
    user-select: none;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 340px;
    transform-style: preserve-3d;
    transition: transform 0.52s cubic-bezier(0.4,0,0.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    text-align: center;
  }

  /* 表面：問題 */
  .card-front {
    background: var(--white);
    box-shadow: var(--card-shadow);
    border: 2px solid #D0E4FA;
  }
  .card-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--blue), var(--accent));
    border-radius: 20px 20px 0 0;
  }

  /* 裏面：解答 */
  .card-back {
    background: linear-gradient(145deg, var(--blue), var(--blue-mid));
    box-shadow: 0 8px 32px rgba(0,87,184,0.35);
    transform: rotateY(180deg);
  }
  .card-back::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.08) 0%, transparent 60%);
    border-radius: 20px;
    pointer-events: none;
  }

  .card-badge {
    font-size: 0.58rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 14px;
  }
  .card-front .card-badge {
    background: var(--blue-pale);
    color: var(--blue);
  }
  .card-back .card-badge {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8);
  }

  .card-num {
    font-size: 0.65rem;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .card-front .card-num { color: var(--sub); }
  .card-back  .card-num { color: rgba(255,255,255,0.5); }

  .card-question {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.7;
    color: var(--text);
  }
  .card-answer {
    font-size: 1.75rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.05em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.15);
    margin-bottom: 6px;
  }
  .card-reading {
    font-size: 0.85rem;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .card-explanation {
    font-size: 0.78rem;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    line-height: 1.65;
    text-align: left;
    background: rgba(0,0,0,0.18);
    border-radius: 10px;
    padding: 9px 13px;
    width: 100%;
  }
  .card-hint {
    position: absolute;
    bottom: 13px;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.06em;
  }
  .card-front .card-hint { color: var(--blue-light); opacity: 0.7; }
  .card-back  .card-hint { color: rgba(255,255,255,0.4); }

  /* ===== 次へボタン ===== */
  .next-btn {
    display: none;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--blue), var(--blue-light));
    color: #fff;
    border: none;
    border-radius: 16px;
    font-size: 1rem;
    font-weight: 900;
    letter-spacing: 0.06em;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 18px rgba(0,87,184,0.35);
    transition: transform 0.12s, box-shadow 0.12s;
    margin-bottom: 12px;
  }
  .next-btn:active {
    transform: scale(0.97);
    box-shadow: 0 2px 8px rgba(0,87,184,0.2);
  }

  /* ===== タップ促進アニメーション ===== */
  @keyframes pulse-ring {
    0%   { transform: scale(1);   opacity: 0.5; }
    70%  { transform: scale(1.06); opacity: 0; }
    100% { transform: scale(1.06); opacity: 0; }
  }
  .card-wrap.waiting .card-inner::after {
    content: '';
    position: absolute;
    inset: -4px;
    border: 2px solid var(--blue-light);
    border-radius: 24px;
    animation: pulse-ring 2s ease-out infinite;
    pointer-events: none;
  }

  /* ===== 結果画面 ===== */
  .result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    text-align: center;
  }
  .result-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
    margin-bottom: 18px;
    box-shadow: 0 8px 28px rgba(0,87,184,0.3);
  }
  .result-title {
    font-size: 1.45rem;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 6px;
  }
  .result-sub {
    font-size: 0.82rem;
    color: var(--sub);
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .btn-restart {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--blue), var(--blue-light));
    color: #fff;
    border: none;
    border-radius: 16px;
    font-size: 1rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 18px rgba(0,87,184,0.3);
  }

  /* ===== フッター ===== */
  .footer {
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.65rem;
    color: var(--sub);
    opacity: 0.55;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="logo">
    <span class="logo-text">STEP教育学館</span>
  </div>
  <div class="header-divider"></div>
  <div class="header-title">社会 フラッシュカード</div>
</div>

<div class="main">

  <!-- 進捗 -->
  <div class="progress-section" id="progress-section">
    <div class="progress-top">
      <div class="progress-label">PROGRESS</div>
      <div class="progress-count"><b id="prog-cur">1</b> / <span id="prog-total">20</span></div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- カード -->
  <div class="card-wrap waiting" id="card-wrap" onclick="flipCard()">
    <div class="card-inner" id="card-inner">

      <!-- 表：問題 -->
      <div class="card-face card-front">
        <div class="card-badge">QUESTION</div>
        <div class="card-num" id="card-num">No. 1</div>
        <div class="card-question" id="card-q">読み込み中…</div>
        <div class="card-hint">▼ タップして答えを確認</div>
      </div>

      <!-- 裏：解答 -->
      <div class="card-face card-back">
        <div class="card-badge">ANSWER</div>
        <div class="card-num" id="card-num-b">No. 1</div>
        <div class="card-answer" id="card-a">—</div>
        <div class="card-reading" id="card-r"></div>
        <div class="card-explanation" id="card-e"></div>
        <div class="card-hint">次へボタンで進む</div>
      </div>

    </div>
  </div>

  <!-- 次へボタン -->
  <button class="next-btn" id="next-btn" onclick="nextCard()">次のカードへ &nbsp;→</button>

  <!-- 結果画面 -->
  <div class="result-screen" id="result-screen">
    <div class="result-circle" id="res-icon">🎉</div>
    <div class="result-title" id="res-title">全問クリア！</div>
    <div class="result-sub">全20枚のカードを確認しました。<br>もう一度やって完璧にしよう！</div>
    <button class="btn-restart" onclick="restart()">🔄 &nbsp;もう一度やる</button>
  </div>

  <div class="footer" id="footer">© STEP教育学館　社会歴史 享保の改革 全20問</div>

</div><!-- /main -->

    e:"江戸時代の庶民向け教育機関。僧侶・武士・町人などが師匠となり、子どもたちに読み書きそろばんを教えた。江戸時代末期には全国に数万か所あったとされる。"

    e:"各藩が武士の子弟を教育するために設立した学校。儒学・武芸・兵学などを学んだ。水戸藩の「弘道館」や萩藩の「明倫館」などが有名。"

let deck = [], current = 0, flipped = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadCard() {
  const cardInner = document.getElementById('card-inner');

  cardInner.style.transition = 'none';
  cardInner.classList.remove('flipped');

  requestAnimationFrame(() => {
    const card = deck[current];
    const label = `No. ${current + 1}`;
    document.getElementById('card-num').textContent   = label;
    document.getElementById('card-num-b').textContent = label;
    document.getElementById('card-q').textContent     = card.q;
    document.getElementById('card-a').textContent     = card.a;
    document.getElementById('card-r').textContent     = card.r;
    document.getElementById('card-e').textContent     = card.e;

    requestAnimationFrame(() => { cardInner.style.transition = ''; });
  });

  flipped = false;
  document.getElementById('next-btn').style.display  = 'none';
  document.getElementById('card-wrap').classList.add('waiting');
  document.getElementById('card-wrap').style.cursor  = 'pointer';

  const pct = Math.round((current / deck.length) * 100);
  document.getElementById('prog-cur').textContent    = current + 1;
  document.getElementById('prog-fill').style.width   = pct + '%';
}

function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('card-inner').classList.add('flipped');
  document.getElementById('card-wrap').classList.remove('waiting');
  document.getElementById('card-wrap').style.cursor  = 'default';
  document.getElementById('next-btn').style.display  = 'block';
}

function nextCard() {
  current++;
  if (current >= deck.length) {
    showResult();
  } else {
    loadCard();
  }
}

function showResult() {
  document.getElementById('progress-section').style.display = 'none';
  document.getElementById('card-wrap').style.display        = 'none';
  document.getElementById('next-btn').style.display         = 'none';
  document.getElementById('footer').style.display           = 'none';
  document.getElementById('result-screen').style.display    = 'flex';
}

function restart() {
  current = 0;
  deck = shuffle(ALL_CARDS);
  document.getElementById('progress-section').style.display = 'block';
  document.getElementById('card-wrap').style.display        = 'block';
  document.getElementById('footer').style.display           = 'block';
  document.getElementById('result-screen').style.display    = 'none';
  loadCard();
}

// 初期化
deck = shuffle(ALL_CARDS);
document.getElementById('prog-total').textContent = ALL_CARDS.length;
loadCard();
</script>
</body>
